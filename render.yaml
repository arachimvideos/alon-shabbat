services:
  - type: web
    name: aloney-shabbat-api
    runtime: docker
    rootDir: backend
    plan: free
    envVars:
      - key: ALLOWED_ORIGINS
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_BUCKET
        value: alon-shabbat-uploads

  - type: web
    name: aloney-shabbat-web
    runtime: docker
    rootDir: frontend
    plan: free
    envVars:
      - key: VITE_API_BASE
        sync: false
